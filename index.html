<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extralibris - Dashboard de Maturidade</title>
    <!-- Ordem correta das dependências para evitar erros de inicialização -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Destruturação segura do Recharts
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
            RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar, Cell 
        } = window.Recharts;

        // Ícones via Lucide (componente simplificado para CDN)
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const initialData = [
            { escola: "SESI Luziania", estudantes: 593, pontos: 10.51, pontos100: 1.77, taxa: 1.05, nivel: "Nível 2 - Lugar", situacao: "Meta atingida", meta: 1.50 },
            { escola: "SESI Mineiros", estudantes: 440, pontos: 6.73, pontos100: 1.53, taxa: 0.67, nivel: "Nível 2 - Lugar", situacao: "Meta atingida", meta: 1.50 },
            { escola: "SESI Jundiai", estudantes: 858, pontos: 8.58, pontos100: 1.00, taxa: 0.23, nivel: "Nível 3 - Seleção", situacao: "Meta atingida", meta: 1.50 },
            { escola: "SESI Aparecida", estudantes: 365, pontos: 0.75, pontos100: 0.21, taxa: 0.75, nivel: "Nível 1 - Item", situacao: "Atenção", meta: 1.50 },
            { escola: "SESI Dr. Celso Charuri", estudantes: 231, pontos: 0.50, pontos100: 0.22, taxa: 0.50, nivel: "Nível 1 - Item", situacao: "Atenção", meta: 1.50 },
            { escola: "SESI Itumbiara", estudantes: 714, pontos: 0.46, pontos100: 0.06, taxa: 0.46, nivel: "Nível 1 - Item", situacao: "Atenção", meta: 1.50 },
            { escola: "SESI Campinas", estudantes: 601, pontos: 0.23, pontos100: 0.04, taxa: 0.23, nivel: "Nível 1 - Item", situacao: "Atenção", meta: 1.50 },
            { escola: "SESI Crixás", estudantes: 58, pontos: 0.00, pontos100: 0.00, taxa: 0.00, nivel: "Nível 1 - Item", situacao: "Atenção", meta: 1.50 }
        ];

        const MetricBar = ({ label, value, target, max, help }) => {
            const percentage = Math.min((value / max) * 100, 100);
            const targetPos = (target / max) * 100;
            return (
                <div className="space-y-2">
                    <div className="flex justify-between items-end">
                        <div>
                            <div className="text-[11px] font-black text-slate-800 uppercase tracking-tight">{label}</div>
                            <div className="text-[9px] text-slate-400 font-medium">{help}</div>
                        </div>
                        <span className="text-lg font-black text-slate-900">{value.toFixed(2)}</span>
                    </div>
                    <div className="relative h-2.5 w-full bg-slate-100 rounded-full overflow-hidden">
                        <div className={`h-full rounded-full transition-all duration-1000 ${value >= target ? 'bg-green-500' : 'bg-blue-600'}`} style={{ width: `${percentage}%` }} />
                        <div className="absolute top-0 bottom-0 w-0.5 bg-slate-900 z-10 opacity-30" style={{ left: `${targetPos}%` }} />
                    </div>
                    <div className="flex justify-between text-[8px] font-black text-slate-400 uppercase tracking-[0.1em]">
                        <span>Base 0</span>
                        <span className="text-slate-900">Meta: {target}</span>
                        <span>Máx: {max}</span>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [data, setData] = useState(initialData);
            const [selectedSchool, setSelectedSchool] = useState(initialData[0]);
            const [searchTerm, setSearchTerm] = useState("");
            const [filterStatus, setFilterStatus] = useState("Todos");

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const text = e.target.result;
                        const rows = text.split('\n').slice(1);
                        const newData = rows.map(row => {
                            const cols = row.split(';');
                            if (cols.length < 5) return null;
                            const pts100 = parseFloat(cols[3]?.replace(',', '.'));
                            const meta = parseFloat(cols[7]?.replace(',', '.')) || 1.5;
                            return {
                                escola: cols[0],
                                estudantes: parseInt(cols[1]),
                                pontos: parseFloat(cols[2]?.replace(',', '.')),
                                pontos100: pts100,
                                taxa: parseFloat(cols[4]?.replace(',', '.')),
                                nivel: cols[5],
                                situacao: pts100 >= meta ? "Meta atingida" : "Atenção",
                                meta: meta
                            };
                        }).filter(Boolean);
                        if (newData.length > 0) {
                            setData(newData);
                            setSelectedSchool(newData[0]);
                        }
                    };
                    reader.readAsText(file);
                }
            };

            const filteredData = useMemo(() => {
                return data.filter(item => {
                    const matchesSearch = item.escola.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesFilter = filterStatus === "Todos" || item.situacao === filterStatus;
                    return matchesSearch && matchesFilter;
                }).sort((a, b) => b.pontos100 - a.pontos100);
            }, [data, searchTerm, filterStatus]);

            const radarData = useMemo(() => {
                if (!selectedSchool) return [];
                return [
                    { subject: 'Engajamento', value: (selectedSchool.taxa * 100), fullMark: 100 },
                    { subject: 'Produtividade', value: (selectedSchool.pontos100 * 50), fullMark: 100 },
                    { subject: 'Volume', value: (selectedSchool.pontos * 10), fullMark: 100 },
                    { subject: 'Escala Alunos', value: (selectedSchool.estudantes / 10), fullMark: 100 },
                    { subject: 'Eficiência Meta', value: (selectedSchool.pontos100 / selectedSchool.meta * 100), fullMark: 100 },
                ];
            }, [selectedSchool]);

            const stats = useMemo(() => {
                const total = data.length;
                const metaAtingida = data.filter(d => d.situacao === "Meta atingida").length;
                const mediaPontos = (data.reduce((acc, curr) => acc + curr.pontos100, 0) / total).toFixed(2);
                return { total, metaAtingida, mediaPontos, perc: ((metaAtingida / total) * 100).toFixed(0) };
            }, [data]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <header className="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row md:items-start justify-between gap-6">
                        <div className="flex-1">
                            <h1 className="text-4xl font-black tracking-tight text-slate-900 flex items-center gap-3">
                                <Icon name="trending-up" className="text-blue-600" size={36} /> EXTRALIBRIS
                            </h1>
                            <p className="text-slate-500 font-medium mt-1">Inteligência de Dados para Bibliotecas Escolares</p>
                        </div>
                        <div className="flex flex-col items-end gap-4">
                            <div className="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                                <img src="https://i.postimg.cc/5y6TzvGM/marca_SESI_2024_completa_colorida.png" alt="SESI" className="h-10 md:h-12 w-auto" />
                            </div>
                            <label className="flex items-center gap-2 bg-white px-5 py-2.5 rounded-xl shadow-sm border border-slate-200 cursor-pointer hover:border-blue-400 transition-all group">
                                <Icon name="upload" className="text-blue-600" />
                                <span className="text-sm font-bold text-slate-700">Importar Dados CSV</span>
                                <input type="file" className="hidden" accept=".csv" onChange={handleFileUpload} />
                            </label>
                        </div>
                    </header>

                    {/* Intro */}
                    <section className="max-w-7xl mx-auto mb-8">
                        <div className="bg-gradient-to-r from-blue-600 to-blue-800 p-8 rounded-3xl text-white shadow-xl relative overflow-hidden">
                            <div className="relative z-10 max-w-3xl">
                                <h2 className="text-xl font-bold mb-3 flex items-center gap-2"><Icon name="info" /> Entenda o seu Dashboard</h2>
                                <p className="text-blue-50 leading-relaxed text-sm md:text-base">
                                    O <strong>Dashboard Extralibris</strong> é uma ferramenta de gestão estratégica que traduz o impacto pedagógico das bibliotecas em indicadores acionáveis. Analisamos o <strong>perfil de maturidade</strong> para transformar bibliotecas em centros de inovação.
                                </p>
                            </div>
                        </div>
                    </section>

                    <main className="max-w-7xl mx-auto space-y-6">
                        {/* KPIs */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col group hover:shadow-md transition-shadow">
                                <div className="flex items-center gap-2 text-slate-400 mb-2 font-black text-[10px] uppercase"><Icon name="users" size={14}/> Total Escolas</div>
                                <div className="text-3xl font-black">{stats.total}</div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col group hover:shadow-md transition-shadow">
                                <div className="flex items-center gap-2 text-green-500 mb-2 font-black text-[10px] uppercase"><Icon name="check-circle" size={14}/> Meta Atingida</div>
                                <div className="text-3xl font-black">{stats.metaAtingida} <small className="text-sm font-bold text-slate-300">{stats.perc}%</small></div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col group hover:shadow-md transition-shadow">
                                <div className="flex items-center gap-2 text-blue-600 mb-2 font-black text-[10px] uppercase"><Icon name="award" size={14}/> Média Score</div>
                                <div className="text-3xl font-black">{stats.mediaPontos}</div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col group hover:shadow-md transition-shadow">
                                <div className="flex items-center gap-2 text-rose-500 mb-2 font-black text-[10px] uppercase"><Icon name="alert-circle" size={14}/> Em Atenção</div>
                                <div className="text-3xl font-black">{stats.total - stats.metaAtingida}</div>
                            </div>
                        </div>

                        {/* Search & Filters */}
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-4 items-center justify-between">
                            <div className="relative w-full md:w-96">
                                <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    type="text" 
                                    placeholder="Pesquisar unidade escolar..." 
                                    className="w-full pl-10 pr-4 py-2 rounded-xl bg-slate-50 border-slate-100 focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none text-sm font-medium"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex items-center gap-2">
                                {["Todos", "Meta atingida", "Atenção"].map(status => (
                                    <button
                                        key={status}
                                        onClick={() => setFilterStatus(status)}
                                        className={`px-5 py-2 rounded-xl text-xs font-bold transition-all ${
                                            filterStatus === status 
                                            ? "bg-blue-600 text-white shadow-lg" 
                                            : "bg-slate-100 text-slate-500 hover:bg-slate-200"
                                        }`}
                                    >
                                        {status}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Ranking */}
                            <div className="lg:col-span-1 bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex flex-col h-[700px]">
                                <div className="p-5 border-b font-black text-slate-800 uppercase tracking-tight bg-slate-50/50">Ranking de Desempenho</div>
                                <div className="overflow-y-auto flex-1 p-3 space-y-2 custom-scrollbar">
                                    {filteredData.map((school, idx) => (
                                        <button key={school.escola} onClick={() => setSelectedSchool(school)} className={`w-full flex items-center p-4 rounded-2xl transition-all ${selectedSchool.escola === school.escola ? "ring-2 ring-blue-500 shadow-lg scale-[1.02]" : "hover:bg-slate-50"}`}>
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-sm font-black mr-4 ${idx < 3 ? "bg-amber-100 text-amber-600" : "bg-slate-100 text-slate-400"}`}>{idx + 1}º</div>
                                            <div className="text-left flex-1 min-w-0">
                                                <div className="text-sm font-bold truncate">{school.escola}</div>
                                                <div className="text-[10px] font-black text-blue-500 uppercase">{school.nivel}</div>
                                            </div>
                                            <div className="text-right ml-2 font-black text-slate-900">{school.pontos100.toFixed(2)}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Details */}
                            <div className="lg:col-span-2 space-y-6">
                                <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-blue-50/50 rounded-bl-full -mr-32 -mt-32" />
                                    <div className="flex flex-col md:flex-row justify-between mb-10 gap-4 relative z-10">
                                        <div>
                                            <div className={`inline-flex px-3 py-1 rounded-lg text-[10px] font-black uppercase mb-3 ${selectedSchool.situacao === "Meta atingida" ? "bg-green-100 text-green-700" : "bg-rose-100 text-rose-700"}`}>{selectedSchool.situacao}</div>
                                            <h3 className="text-3xl font-black tracking-tight">{selectedSchool.escola}</h3>
                                            <div className="text-xs font-bold text-slate-400 mt-2 uppercase">{selectedSchool.nivel}</div>
                                        </div>
                                        <div className="bg-slate-900 px-8 py-5 rounded-[1.5rem] text-center text-white shadow-xl">
                                            <div className="text-4xl font-black">{selectedSchool.pontos100.toFixed(2)}</div>
                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Score Final</div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center relative z-10">
                                        <div className="h-64">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <RadarChart data={radarData}>
                                                    <PolarGrid stroke="#e2e8f0" />
                                                    <PolarAngleAxis dataKey="subject" tick={{ fontSize: 9, fill: '#94a3b8', fontWeight: 800 }} />
                                                    <Radar name={selectedSchool.escola} dataKey="value" stroke="#2563eb" strokeWidth={3} fill="#2563eb" fillOpacity={0.1} />
                                                </RadarChart>
                                            </ResponsiveContainer>
                                        </div>
                                        <div className="space-y-6">
                                            <MetricBar label="Taxa de Empréstimo" value={selectedSchool.taxa} target={1.0} max={3} help="Circulação do acervo por aluno." />
                                            <MetricBar label="Produtividade (Pts/100)" value={selectedSchool.pontos100} target={selectedSchool.meta} max={3} help="Pontuação normalizada para 100 alunos." />
                                        </div>
                                    </div>
                                </div>

                                {/* Glossário */}
                                <div className="bg-slate-900 p-8 rounded-3xl text-white">
                                    <h3 className="text-lg font-bold mb-6 flex items-center gap-2 uppercase tracking-tight"><Icon name="layers" className="text-blue-400"/> Glossário & Notas</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-xs leading-relaxed text-slate-400">
                                        <div>
                                            <h4 className="text-blue-400 font-bold uppercase mb-2">Pontos / 100 Estudantes</h4>
                                            Métrica mestre que permite comparar escolas de diferentes tamanhos de forma justa.
                                        </div>
                                        <div>
                                            <h4 className="text-blue-400 font-bold uppercase mb-2">Maturidade Extralibris</h4>
                                            Nível 1 (Item), Nível 2 (Lugar) e Nível 3 (Seleção) definem o estágio pedagógico da biblioteca.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                    <footer className="max-w-7xl mx-auto mt-12 pb-8 flex justify-between items-center text-slate-400 text-[10px] font-black uppercase tracking-widest">
                        <div>Sistema Extralibris v2.5.1</div>
                        <div className="flex gap-8">
                            <span>Relatório Gerencial</span>
                            <span>Suporte SESI</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
